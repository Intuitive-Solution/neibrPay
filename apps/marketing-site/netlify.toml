# Netlify: set Base directory to apps/marketing-site (this folder).
# Clear the UI "Build command" / "Publish directory" so this file controls them (avoid duplicates).
#
# Lockfile lives at the monorepo root; cwd may be this app folder, so we cd via git first.
# npm 11.3+ fixes oxc-parser optional deps on Linux (npm/cli#4828).

[build]
  command = "cd \"$(git rev-parse --show-toplevel)\" && npm ci && npm run generate:marketing"
  # Relative to Base directory (apps/marketing-site), not repo root
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "11"
