# Netlify “package path” / monorepo: build runs with cwd = repo root (/opt/build/repo), not this folder.
# Do not `cd ../..` — that leaves the repo and breaks npm ci (no package-lock.json).
#
# Fixes oxc-parser optional native bindings on Linux (npm < 11.3). Publish path is from repo root.

[build]
  command = "npm ci && npm run generate:marketing"
  publish = "apps/marketing-site/.output/public"

[build.environment]
  NODE_VERSION = "20"
  # npm 11.3+ fixes optionalDependencies / oxc-parser bindings in workspaces (see npm/cli#4828)
  NPM_VERSION = "11"
