# Netlify: Base directory = apps/marketing-site (this folder).
# Clear UI "Build command" / "Publish directory" so only this file controls them.
#
# npm has a known bug with optional native bindings in workspaces (npm/cli#4828).
# Netlify's automatic install creates a broken node_modules. The fix is to wipe it
# and do a fresh install inside the build command so platform bindings resolve correctly.

[build]
  command = "cd \"$(git rev-parse --show-toplevel)\" && rm -rf node_modules && npm install && npm run generate:marketing"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "11"
