# Netlify: Base directory = apps/marketing-site. Clear duplicate build/publish in the UI.
#
# Netlify runs npm install before this script; that tree can miss workspace optional natives
# (npm/cli#4828). We remove node_modules then npm ci so install matches the lockfile.
# Root package.json optionalDependencies pull @rollup/* and @oxc/* Linux bindings in explicitly.

[build]
  command = "cd \"$(git rev-parse --show-toplevel)\" && rm -rf node_modules && npm ci && npm run build:marketing"
  # `nuxt build` + Nitro `netlify` preset emits static assets to `dist` and serverless handlers under `.netlify/`.
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "11"

[[redirects]]
  from = "/features/financial-reporting"
  to = "/features/budgets-and-reports/"
  status = 301
  force = true

[[redirects]]
  from = "/features/financial-reporting/"
  to = "/features/budgets-and-reports/"
  status = 301
  force = true
